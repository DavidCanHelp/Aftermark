<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aftermark</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111122;
      --bg-surface: #1a1a2e;
      --bg-elevated: #16213e;
      --border: #2a2a4a;
      --border-hover: #4a4a8a;
      --text: #e0e0e0;
      --text-muted: #888;
      --text-dim: #555;
      --white: #fff;
      --accent: #4a8aff;
      --green: #4caf50;
      --blue: #64b5f6;
      --purple: #ba68c8;
      --orange: #ff9800;
      --red: #e74c3c;
      --yellow: #f39c12;
      --cyan: #4dd0e1;
      --pink: #f48fb1;
      --teal: #80cbc4;
    }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }
    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 { font-size: 17px; color: var(--white); }
    .sidebar-header .tagline { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
    .nav-item {
      display: block;
      width: 100%;
      padding: 9px 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active {
      color: var(--white);
      background: rgba(74,138,255,0.08);
      border-left-color: var(--accent);
    }
    .nav-item .nav-count {
      float: right;
      font-size: 11px;
      color: var(--text-dim);
    }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer button {
      width: 100%;
      padding: 7px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .sidebar-footer button:hover { border-color: var(--border-hover); color: var(--text); }
    /* Main */
    .main {
      flex: 1;
      overflow-y: auto;
      height: 100vh;
      padding: 24px 32px;
      min-width: 0;
    }
    .view { display: none; }
    .view.active { display: block; }
    h2 { font-size: 20px; color: var(--white); margin-bottom: 16px; }
    h3 { font-size: 15px; color: var(--text); margin: 20px 0 10px; }
    /* Stats cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-card .stat-value { font-size: 24px; font-weight: 600; color: var(--white); }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    /* Bar chart */
    .bar-chart { margin-bottom: 24px; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .bar-label { width: 140px; text-align: right; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
    .bar-track { flex: 1; height: 16px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-count { width: 40px; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    /* Table */
    .search-bar {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    .search-bar:focus { border-color: var(--border-hover); }
    .search-bar::placeholder { color: var(--text-dim); }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 4px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }
    .bm-table {
      width: 100%;
    }
    .bm-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      gap: 12px;
    }
    .bm-row:hover { background: rgba(255,255,255,0.02); }
    .bm-row .bm-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); font-size: 13px; min-width: 0; }
    .bm-row .bm-domain { width: 160px; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
    .bm-row .bm-badges { display: flex; gap: 4px; flex-shrink: 0; }
    .bm-row .bm-date { width: 90px; font-size: 11px; color: var(--text-dim); flex-shrink: 0; text-align: right; }
    .badge { padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 500; white-space: nowrap; }
    .badge-dead { background: #3a1a1a; color: var(--red); }
    .badge-duplicate { background: #3a2a1a; color: var(--yellow); }
    .badge-ct-github-repo { background: #1a2e1a; color: var(--green); }
    .badge-ct-docs { background: #1a2040; color: var(--blue); }
    .badge-ct-article { background: #2a1a3a; color: var(--purple); }
    .badge-ct-video { background: #2e2a1a; color: var(--orange); }
    .badge-ct-shopping { background: #3a1a1a; color: var(--red); }
    .badge-ct-travel { background: #1a2e2e; color: var(--cyan); }
    .badge-ct-academic { background: #2a2a1a; color: #dce775; }
    .badge-ct-social { background: #2a1a2a; color: var(--pink); }
    .badge-ct-forum { background: #1a2a2a; color: var(--teal); }
    .badge-ct-tool { background: #2a2a2a; color: #b0bec5; }
    .badge-ct-reference { background: #1a1a2e; color: #9fa8da; }
    .badge-ct-unknown { background: #222; color: #666; }
    .badge-ct-news { background: #2a2020; color: #ef9a9a; }
    .badge-ct-real-estate { background: #1a2a20; color: #a5d6a7; }
    .badge-ct-events { background: #2a201a; color: #ffcc80; }
    .badge-ct-package { background: #1a202a; color: #90caf9; }
    .badge-ct-music { background: #2a1a2a; color: #ce93d8; }
    .badge-likely-duplicate { background: #332a1a; color: #e6b84d; }
    /* Cluster card */
    .cluster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .cluster-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
    }
    .cluster-card:hover { border-color: var(--border-hover); }
    .cluster-card .cc-name { font-size: 14px; color: var(--white); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cluster-card .cc-meta { font-size: 12px; color: var(--text-muted); }
    .cluster-card .cc-type { display: inline-block; padding: 1px 6px; border-radius: 6px; font-size: 10px; background: var(--bg-elevated); color: var(--text-dim); margin-left: 4px; }
    /* Session card */
    .session-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .session-card:hover { border-color: var(--border-hover); }
    .session-card .sc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .session-card .sc-domain { font-size: 14px; color: var(--white); }
    .session-card .sc-count { font-size: 12px; color: var(--text-dim); }
    .session-card .sc-time { font-size: 12px; color: var(--text-muted); }
    .session-card .sc-bookmarks { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .session-card.expanded .sc-bookmarks { display: block; }
    /* Review */
    .review-group { margin-bottom: 24px; }
    .review-group h3 { display: flex; align-items: center; gap: 8px; }
    .review-group .review-count { font-size: 12px; color: var(--text-dim); font-weight: normal; }
    .review-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 12px;
    }
    .review-item .ri-title { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .review-item .ri-domain { font-size: 12px; color: var(--text-muted); width: 140px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .review-item button {
      padding: 3px 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .review-item button:hover { border-color: var(--border-hover); color: var(--text); }
    /* Timeline */
    .timeline-month {
      margin-bottom: 12px;
    }
    .timeline-header {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 8px 0;
    }
    .timeline-header:hover .tl-label { color: var(--white); }
    .tl-label { font-size: 14px; color: var(--text); width: 120px; flex-shrink: 0; }
    .tl-bar-track { flex: 1; height: 20px; background: var(--bg-surface); border-radius: 4px; overflow: hidden; }
    .tl-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; opacity: 0.6; }
    .tl-count { width: 50px; font-size: 12px; color: var(--text-muted); text-align: right; flex-shrink: 0; }
    .timeline-items { display: none; padding: 4px 0 8px 132px; }
    .timeline-month.expanded .timeline-items { display: block; }
    .timeline-items .bm-row { padding: 4px 0; border-bottom: none; }
    /* Action icons */
    .row-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      width: 26px; height: 26px;
      display: inline-flex; align-items: center; justify-content: center;
      background: none; border: 1px solid transparent; border-radius: 4px;
      color: var(--text-dim); font-size: 13px; cursor: pointer; padding: 0;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--border); background: var(--bg-elevated); }
    .icon-btn.danger:hover { color: var(--red); border-color: #4a2020; }
    /* Checkbox */
    .bm-check {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px;
      border: 2px solid #444;
      border-radius: 4px;
      background: var(--bg);
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      margin: 0;
    }
    .bm-check:hover { border-color: var(--accent); }
    .bm-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .bm-check:checked::after {
      content: "";
      position: absolute;
      left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: solid var(--white);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    /* Bulk toolbar */
    .bulk-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      margin-bottom: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bulk-header .bulk-count { font-size: 12px; color: var(--text-muted); min-width: 80px; }
    .bulk-actions {
      display: none;
      gap: 6px;
      align-items: center;
    }
    .bulk-actions.visible { display: flex; }
    .bulk-actions button {
      padding: 4px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .bulk-actions button:hover { border-color: var(--border-hover); color: var(--text); }
    .bulk-actions button.danger { color: var(--red); }
    .bulk-actions button.danger:hover { border-color: #6a2020; }
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      min-width: 380px;
      max-width: 500px;
    }
    .modal h3 { margin-bottom: 16px; font-size: 16px; color: var(--white); }
    .modal label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; margin-top: 12px; }
    .modal input, .modal select {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .modal input:focus, .modal select:focus { border-color: var(--border-hover); }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .modal-actions button {
      padding: 7px 16px;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .modal-actions .btn-primary { background: var(--accent); color: var(--white); border-color: var(--accent); }
    .modal-actions .btn-primary:hover { opacity: 0.9; }
    .modal-actions .btn-cancel { background: var(--bg-elevated); color: var(--text-muted); }
    .modal-actions .btn-cancel:hover { color: var(--text); }
    .modal-actions .btn-danger { background: #4a1a1a; color: var(--red); border-color: #5a2020; }
    .modal-actions .btn-danger:hover { background: #5a2020; }
    /* Cluster inline edit */
    .inline-edit {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .inline-edit input {
      padding: 4px 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .inline-edit input:focus { border-color: var(--border-hover); }
    /* Health dot */
    .health-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .health-green { background: var(--green); }
    .health-yellow { background: var(--yellow); }
    .health-red { background: var(--red); }
    /* Favicon */
    .bm-favicon { width: 16px; height: 16px; flex-shrink: 0; border-radius: 2px; }
    /* Sort / filter controls */
    .controls-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .sort-select {
      padding: 4px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .sort-select:focus { border-color: var(--border-hover); }
    .saved-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .saved-filter-btn {
      padding: 3px 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .saved-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .saved-filter-btn .sf-remove { font-size: 10px; opacity: 0.5; }
    .saved-filter-btn .sf-remove:hover { opacity: 1; color: var(--red); }
    /* Folder insights */
    .folder-row {
      display: flex; align-items: center; gap: 12px; padding: 6px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px;
    }
    .folder-row .fr-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .folder-row .fr-stat { width: 60px; text-align: right; flex-shrink: 0; }
    .folder-row.dead-folder { background: rgba(231,76,60,0.08); }
    /* Cluster mini-bar */
    .cc-minibar { display: flex; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .cc-minibar-seg { height: 100%; }
    /* Sparkline timeline */
    .tl-sparkline { display: flex; align-items: flex-end; gap: 1px; height: 24px; flex: 1; }
    .tl-spark-bar { flex: 1; background: var(--accent); opacity: 0.5; border-radius: 1px 1px 0 0; min-width: 2px; position: relative; }
    .tl-spark-bar:hover { opacity: 1; }
    .tl-spark-bar:hover::after {
      content: attr(data-count);
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 4px; font-size: 10px; color: var(--text); white-space: nowrap;
    }
    /* Insights gauge */
    .gauge-big { font-size: 48px; font-weight: 700; }
    .insights-histogram { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
    .insights-histogram .ih-bar { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; min-width: 0; position: relative; }
    .insights-histogram .ih-label { font-size: 9px; color: var(--text-dim); text-align: center; margin-top: 2px; }
    .insights-histogram-wrap { margin-bottom: 16px; }
    .insights-histogram-labels { display: flex; gap: 2px; }
    .insights-histogram-labels span { flex: 1; font-size: 9px; color: var(--text-dim); text-align: center; min-width: 0; overflow: hidden; }
    /* Cleanup wizard */
    .wizard-progress {
      display: flex; align-items: center; gap: 4px; margin-bottom: 24px;
    }
    .wizard-progress .wp-step {
      width: 32px; height: 4px; border-radius: 2px; background: var(--border);
    }
    .wizard-progress .wp-step.done { background: var(--green); }
    .wizard-progress .wp-step.active { background: var(--accent); }
    .wizard-progress-label {
      font-size: 12px; color: var(--text-dim); margin-left: 12px;
    }
    .wizard-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 32px;
      max-width: 640px;
    }
    .wizard-card h3 { font-size: 18px; color: var(--white); margin-bottom: 12px; }
    .wizard-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
    .wizard-card .wiz-examples {
      background: var(--bg-elevated); border-radius: 6px; padding: 12px 16px;
      margin-bottom: 16px; font-size: 13px; color: var(--text);
    }
    .wizard-card .wiz-examples .we-item {
      padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; gap: 8px;
    }
    .wizard-card .wiz-examples .we-item:last-child { border-bottom: none; }
    .wizard-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .wizard-actions button {
      padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer;
      border: 1px solid var(--border);
    }
    .wizard-actions .wiz-primary { background: var(--accent); color: var(--white); border-color: var(--accent); }
    .wizard-actions .wiz-primary:hover { opacity: 0.9; }
    .wizard-actions .wiz-secondary { background: var(--bg-elevated); color: var(--text-muted); }
    .wizard-actions .wiz-secondary:hover { color: var(--text); border-color: var(--border-hover); }
    .wizard-actions .wiz-danger { background: #4a1a1a; color: var(--red); border-color: #5a2020; }
    .wizard-actions .wiz-danger:hover { background: #5a2020; }
    .wizard-skip-all {
      display: block; font-size: 12px; color: var(--text-dim); margin-top: 16px; cursor: pointer;
      background: none; border: none; text-decoration: underline;
    }
    .wizard-skip-all:hover { color: var(--text-muted); }
    .wizard-result {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--green); margin-bottom: 16px;
    }
    .wizard-summary-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
    }
    .wizard-summary-grid .ws-item {
      background: var(--bg-elevated); border-radius: 6px; padding: 12px 14px;
    }
    .wizard-summary-grid .ws-label { font-size: 11px; color: var(--text-dim); }
    .wizard-summary-grid .ws-value { font-size: 18px; font-weight: 600; color: var(--white); margin-top: 2px; }
    /* Utilities */
    .empty-state { text-align: center; color: var(--text-dim); padding: 40px 0; }
