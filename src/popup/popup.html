<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .tagline { font-size: 11px; color: #666; margin-bottom: 14px; }
    .stat-line { font-size: 13px; color: #aaa; margin-bottom: 14px; }
    .stat-line strong { color: #fff; }
    button {
      width: 100%;
      padding: 10px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    button:hover { background: #1a2744; border-color: #4a4a8a; color: #fff; }
  </style>
</head>
<body>
  <h1>Aftermark</h1>
  <div class="tagline">Your bookmarks are breadcrumbs.</div>
  <div class="stat-line"><strong id="count">—</strong> bookmarks indexed</div>
  <button id="open">Open Aftermark</button>
  <button id="settings">Settings</button>
  <script src="/dist/popup/popup.js" type="module"></script>
</body>
</html>
